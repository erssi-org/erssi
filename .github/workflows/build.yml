name: Build erssi

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            artifact: erssi-linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            artifact: erssi-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libutf8proc-dev libperl-dev libotr5-dev libglib2.0-dev libssl-dev libgcrypt20-dev libcurl4-openssl-dev libchafa-dev python3-pip

      - name: Install meson
        run: pip3 install --break-system-packages meson

      - name: Checkout with tags
        run: git fetch --tags

      - name: Setup build
        run: meson setup Build --prefix=/opt/erssi -Dwith-perl=yes -Dwith-otr=yes -Dwith-proxy=yes -Dwith-fe-web=yes -Dwith-image-preview=yes -Ddisable-utf8proc=no

      - name: Build
        run: ninja -C Build

      - name: Run tests
        run: ninja -C Build test
        continue-on-error: true

      - name: Install
        run: sudo ninja -C Build install

      - name: Package artifact
        run: |
          cd /opt
          tar czf ${{ runner.temp }}/${{ matrix.artifact }}.tar.gz erssi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/${{ matrix.artifact }}.tar.gz

  build-macos:
    name: macOS ARM64
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install meson ninja glib openssl@3 utf8proc libgcrypt libotr perl chafa curl pkg-config

      - name: Checkout with tags
        run: git fetch --tags

      - name: Setup build
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/opt/homebrew/opt/openssl@3/lib/pkgconfig
        run: |
          export PKG_CONFIG_PATH="/opt/homebrew/opt/utf8proc/lib/pkgconfig:$PKG_CONFIG_PATH"
          meson setup Build --prefix=/opt/erssi -Dwith-perl=yes -Dwith-otr=yes -Dwith-proxy=yes -Dwith-fe-web=yes -Dwith-image-preview=yes -Ddisable-utf8proc=no

      - name: Build
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/opt/homebrew/opt/openssl@3/lib/pkgconfig:/opt/homebrew/opt/utf8proc/lib/pkgconfig
        run: ninja -C Build

      - name: Run tests
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/opt/homebrew/opt/openssl@3/lib/pkgconfig:/opt/homebrew/opt/utf8proc/lib/pkgconfig
        run: ninja -C Build test
        continue-on-error: true

      - name: Install
        run: sudo ninja -C Build install

      - name: Package artifact
        run: |
          cd /opt
          tar czf ${{ runner.temp }}/erssi-macos-arm64.tar.gz erssi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erssi-macos-arm64
          path: ${{ runner.temp }}/erssi-macos-arm64.tar.gz

  build-freebsd:
    name: FreeBSD ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          arch: ${{ matrix.arch == 'arm64' && 'aarch64' || 'x86_64' }}
          usesh: true
          mem: 8192
          cpu: 4
          sync: ${{ matrix.arch == 'arm64' && 'scp' || 'rsync' }}
          prepare: |
            pkg install -y meson ninja pkgconf glib2 openssl utf8proc libgcrypt libotr perl5 chafa curl
          run: |
            git fetch --tags
            meson setup Build --prefix=/opt/erssi -Dwith-perl=yes -Dwith-otr=yes -Dwith-proxy=yes -Dwith-fe-web=yes -Dwith-image-preview=yes -Ddisable-utf8proc=no
            ninja -C Build
            ninja -C Build test || true
            ninja -C Build install
            cd /opt
            tar czf erssi-freebsd-${{ matrix.arch }}.tar.gz erssi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erssi-freebsd-${{ matrix.arch }}
          path: erssi-freebsd-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-freebsd]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz