name: Build erssi

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            artifact: erssi-linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            artifact: erssi-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libutf8proc-dev libperl-dev libotr5-dev libglib2.0-dev libssl-dev libgcrypt20-dev libcurl4-openssl-dev libchafa-dev python3-pip python3-venv

      - name: Install meson system-wide
        run: |
          python3 -m venv /opt/meson
          /opt/meson/bin/pip install meson
          sudo ln -sf /opt/meson/bin/meson /usr/local/bin/meson

      - name: Checkout with tags
        run: git fetch --tags

      - name: Setup build
        run: meson setup Build --prefix=/opt/erssi -Dwith-perl=yes -Dwith-otr=yes -Dwith-proxy=yes -Dwith-fe-web=yes -Dwith-image-preview=yes -Ddisable-utf8proc=no

      - name: Build
        run: ninja -C Build

      - name: Run tests
        run: ninja -C Build test
        continue-on-error: true

      - name: Install
        run: sudo meson install -C Build

      - name: Package artifact
        run: |
          cd /opt
          tar czf ${{ runner.temp }}/${{ matrix.artifact }}.tar.gz erssi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/${{ matrix.artifact }}.tar.gz

  build-macos:
    name: macOS ARM64
    runs-on: macos-26
    env:
      LDFLAGS: -L/opt/homebrew/opt/utf8proc/lib -L/opt/homebrew/opt/openssl@3/lib -L/opt/homebrew/opt/libgcrypt/lib -L/opt/homebrew/opt/libotr/lib
      CPPFLAGS: -I/opt/homebrew/opt/utf8proc/include -I/opt/homebrew/opt/openssl@3/include
      PKG_CONFIG_PATH: /opt/homebrew/opt/utf8proc/lib/pkgconfig:/opt/homebrew/opt/openssl@3/lib/pkgconfig:/opt/homebrew/lib/pkgconfig
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install meson ninja glib openssl@3 utf8proc libgcrypt libotr perl chafa curl pkg-config

      - name: Checkout with tags
        run: git fetch --tags

      - name: Setup build
        run: meson setup Build --prefix=/opt/erssi -Dwith-perl=yes -Dwith-otr=yes -Dwith-proxy=yes -Dwith-fe-web=yes -Dwith-image-preview=yes -Ddisable-utf8proc=no

      - name: Build
        run: ninja -C Build

      - name: Run tests
        run: ninja -C Build test
        continue-on-error: true

      - name: Install
        run: sudo meson install -C Build

      - name: Package artifact
        run: |
          cd /opt
          tar czf ${{ runner.temp }}/erssi-macos-arm64.tar.gz erssi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erssi-macos-arm64
          path: ${{ runner.temp }}/erssi-macos-arm64.tar.gz

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
